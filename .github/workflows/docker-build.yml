name: Docker Build and Test

on:
  # Trigger on every push to the main branch
  push:
    branches: [main]
  # Trigger on pull requests targeting main
  pull_request:
    branches: [main]

env:
  # Image name used for tagging
  IMAGE_NAME: docker-tutorial

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code so the workflow can access it
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx for advanced build features (caching, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build the NestJS app Dockerfile
      #    We build both development and production targets to verify they compile.
      - name: Build development image
        run: |
          docker buildx build \
            --target development \
            -t ${{ env.IMAGE_NAME }}:dev \
            .

      - name: Build production image
        run: |
          docker buildx build \
            --target production \
            -t ${{ env.IMAGE_NAME }}:prod \
            .

      # 4. Run docker compose tests (if any)
      #    This validates that the multi-service stack starts and healthchecks pass.
      - name: Start services with Docker Compose
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d --build

      - name: Wait for healthchecks
        run: |
          echo "Waiting for services to become healthy..."
          sleep 30
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml ps

      - name: Run basic smoke test
        run: |
          curl -f http://localhost:4001 || true

      - name: Tear down services
        if: always()
        run: |
          docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml down -v

      # 5. Log in to GitHub Container Registry (GHCR)
      #    Only run on pushes to main (not on PRs) so forks don't fail on auth.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6. Push images to GHCR
      #    Tag with the commit SHA for traceability and 'latest' for convenience.
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker buildx build \
            --target production \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest \
            --push .
