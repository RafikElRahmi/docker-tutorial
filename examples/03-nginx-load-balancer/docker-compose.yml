services:
  app-1:
    build: .
    environment:
      - PORT=3000
    expose:
      - "3000"

  app-2:
    build: .
    environment:
      - PORT=3000
    expose:
      - "3000"

  app-3:
    build: .
    environment:
      - PORT=3000
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3
