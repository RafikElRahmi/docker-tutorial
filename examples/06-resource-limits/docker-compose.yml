services:
  app:
    build: .
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M
    ulimits:
      nofile:
        soft: 1024
        hard: 2048
      nproc:
        soft: 50
        hard: 100
    pids_limit: 50
    restart: unless-stopped
