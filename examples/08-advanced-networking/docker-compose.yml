services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - public
    depends_on:
      - api

  api:
    build: .
    networks:
      - public
      - backend
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    networks:
      backend:
        aliases:
          - database
          - postgres
    # No ports exposed to host - completely internal!

networks:
  public:
    driver: bridge
  backend:
    driver: bridge
    internal: true
